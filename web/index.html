<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <!-- CSP is served via HTTP header in server.js to avoid meta-tag placement warnings -->
    <title>Arena Slideshow</title>
    <!-- Core NUI CSS -->
    <link rel="stylesheet" href="/nui/css/nui-theme.css">
    <!-- Addon CSS -->
    <link rel="stylesheet" href="/nui/css/modules/nui-list.css">
    <!-- Addon JS -->
    <script type="module" src="/nui/lib/modules/nui-list.js"></script>
    <!-- App CSS -->
    <link rel="stylesheet" href="/css/main.css">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        nui-app:not(.nui-ready) { display: none; }
        nui-loading:not(.active) { display: none; }
    </style>
    <!-- Dynamic config from server -->
    <script src="/js/config.js"></script>
    <!-- Main App Logic -->
    <script type="module" src="/js/app.js"></script>
</head>
<body>
    <nui-loading mode="bar"></nui-loading>

    <nui-app content-width="100%">
        <nui-skip-links></nui-skip-links>

        <nui-app-header>
            <header>
                <div slot="left">
                    <!-- Stepper replaces the page title. Each step is a real
                         button that navigates to the corresponding router
                         page. The active step is highlighted via variant.
                         Steps 2 and 3 are disabled until a project is
                         loaded (controlled by stepper.js). -->
                    <nav class="stepper" aria-label="Workflow steps">
                        <nui-button data-step="projects" data-action="goto-step:projects" variant="primary">
                            <button type="button">
                                <span class="stepper-num">1</span>
                                <span>Projects</span>
                            </button>
                        </nui-button>
                        <span class="stepper-sep" aria-hidden="true">—</span>
                        <nui-button data-step="editor" data-action="goto-step:editor" variant="ghost">
                            <button type="button" disabled>
                                <span class="stepper-num">2</span>
                                <span>Editor</span>
                            </button>
                        </nui-button>
                        <span class="stepper-sep" aria-hidden="true">—</span>
                        <nui-button data-step="render" data-action="goto-step:render" variant="ghost">
                            <button type="button" disabled>
                                <span class="stepper-num">3</span>
                                <span>Render &amp; Play</span>
                            </button>
                        </nui-button>
                    </nav>
                </div>
                <div slot="right">
                    <nui-button data-action="toggle-theme" variant="icon">
                        <button type="button" aria-label="Toggle theme">
                            <nui-icon name="brightness"></nui-icon>
                        </button>
                    </nui-button>
                </div>
            </header>
        </nui-app-header>

        <nui-content>
            <nui-main></nui-main>
        </nui-content>
    </nui-app>
</body>
</html>

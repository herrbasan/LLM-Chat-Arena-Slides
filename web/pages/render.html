<div class="page-render">
    <div class="render-layout">
        <!-- Left: Slide list + controls -->
        <div class="render-sidebar">
            <nui-card>
                <div class="render-status-card">
                    <h3>Render</h3>
                    <nui-button variant="primary" data-action="render-all" id="btn-render-wrap">
                        <button type="button" id="btn-render">Render All</button>
                    </nui-button>
                    <nui-button variant="danger" data-action="render-stop" id="btn-stop-wrap" hidden>
                        <button type="button" id="btn-stop">Stop</button>
                    </nui-button>
                </div>
                <div id="render-status" class="render-status-row">
                    <p class="render-status-hint">Click Render to generate audio.</p>
                </div>
                <div id="render-progress-wrap" class="render-progress-wrap" hidden>
                    <nui-progress id="render-progress" value="0" max="100"></nui-progress>
                    <p id="render-progress-text" class="render-progress-text">Render starting…</p>
                </div>
            </nui-card>

            <nui-card class="render-slide-list-card">
                <h3>Slides</h3>
                <div id="render-message-list">
                    <!-- Injected by JS -->
                </div>
            </nui-card>
        </div>

        <!-- Right: Player -->
        <div class="render-player">
            <div id="player-container">
                <div id="player-slide-content">
                    <div class="render-empty-player">
                        <p>Render the deck to enable playback.</p>
                    </div>
                </div>
            </div>

            <!-- Progress bar -->
            <div id="playback-progress-bar">
                <div id="playback-progress-fill"></div>
            </div>

            <!-- Controls -->
            <div class="render-controls">
                <div class="control-button">
                    <nui-button variant="icon" data-action="player-prev">
                        <button type="button" aria-label="Previous slide" class="icon-flip-horizontal">
                            <nui-icon name="arrow"></nui-icon>
                        </button>
                    </nui-button>
                </div>
                <div class="control-button">
                    <nui-button variant="primary" data-action="player-play">
                        <button type="button" id="btn-play" aria-label="Play">
                            <nui-icon name="play"></nui-icon>
                        </button>
                    </nui-button>
                </div>
                <div class="control-button">
                    <nui-button variant="icon" data-action="player-next">
                        <button type="button" aria-label="Next slide">
                            <nui-icon name="arrow"></nui-icon>
                        </button>
                    </nui-button>
                </div>
                <span id="time-display">00:00 / 00:00</span>
                <nui-button variant="ghost" data-action="player-speed" id="btn-speed">
                    <button type="button">1.0x</button>
                </nui-button>
            </div>
        </div>
    </div>
</div>

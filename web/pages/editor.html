<div class="page-editor">
    <!-- Two-column layout: slides (left, ~70%) and voice panel (right, ~30%).
         The voice panel is always visible — voice mapping is per-project
         and is one of the things the user tunes in the editor. -->
    <div class="editor-grid">
        <!-- Left: Slide Deck -->
        <section class="editor-slides">
            <div class="editor-toolbar">
                <nui-button variant="icon" data-action="back-to-projects">
                    <button type="button" aria-label="Back to projects">
                        <nui-icon name="arrow_back"></nui-icon>
                    </button>
                </nui-button>
                <h2 class="editor-title" id="editor-project-title">Untitled</h2>
                <div class="editor-toolbar-actions">
                    <nui-button variant="primary" data-action="generate-deck" title="Run AI text cleaning on each message (removes stage directions, client-side noise, etc.)">
                        <button type="button">Clean text with AI</button>
                    </nui-button>
                    <nui-button data-action="goto-render">
                        <button type="button">Render &amp; Play →</button>
                    </nui-button>
                </div>
            </div>
            <div id="slide-deck" class="editor-slide-list">
                <!-- Slide cards injected here -->
            </div>
        </section>

        <!-- Right: Voice panel — always-visible controls for narrator /
             participant voices and speeds. -->
        <aside class="editor-side-panel" id="voice-panel">
            <header class="editor-side-panel__header">
                <h3>Voices</h3>
                <p class="editor-side-panel__hint">Per-project voice mapping. Changes are saved automatically.</p>
            </header>
            <div id="voice-panel-body" class="editor-side-panel__body">
                <!-- Voice rows injected here -->
            </div>
        </aside>
    </div>
</div>

<div class="page-editor">
    <!-- Two-column layout: slides (left, ~70%) and chat (right, ~30%).
         Voice mapping and conversation source move into an options
         dialog, opened via the gear button in the toolbar. -->
    <div class="editor-grid">
        <!-- Left: Slide Deck -->
        <section class="editor-slides">
            <div class="editor-toolbar">
                <nui-button variant="icon" data-action="back-to-projects">
                    <button type="button" aria-label="Back to projects">
                        <nui-icon name="arrow_back"></nui-icon>
                    </button>
                </nui-button>
                <h2 class="editor-title" id="editor-project-title">Untitled</h2>
                <div class="editor-toolbar-actions">
                    <nui-button variant="primary" data-action="generate-deck">
                        <button type="button">Generate with AI</button>
                    </nui-button>
                    <nui-button variant="icon" data-action="open-options" title="Voice mapping & source">
                        <button type="button" aria-label="Open options">
                            <nui-icon name="settings"></nui-icon>
                        </button>
                    </nui-button>
                    <nui-button data-action="goto-render">
                        <button type="button">Render &amp; Play →</button>
                    </nui-button>
                </div>
            </div>
            <div id="slide-deck" class="editor-slide-list">
                <!-- Slide cards injected here -->
            </div>
        </section>

        <!-- Right: LLM Chat -->
        <aside class="editor-chat">
            <header class="editor-chat-header">
                <h3>Slide AI</h3>
            </header>
            <div id="chat-history" class="editor-chat-history">
                <!-- Chat messages injected here -->
            </div>
            <div class="editor-chat-input">
                <nui-input>
                    <input type="text" id="chat-input" placeholder="Ask the AI to edit slides…">
                </nui-input>
                <nui-button variant="primary" data-action="chat-send">
                    <button type="button">Send</button>
                </nui-button>
            </div>
        </aside>
    </div>
</div>

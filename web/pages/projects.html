<div class="page-projects">
    <!-- Page-level dropzone overlay. Invisible by default (NUI
         dropzone design); appears only while dragging a file over
         the window. Works in both empty and populated states. -->
    <nui-dropzone id="import-dropzone-page">
        <div data-drop="import" class="dropzone-page-target">
            <div class="dropzone-page-content">
                <nui-icon name="upload" aria-hidden="true"></nui-icon>
                <h2>Drop Arena conversation to import</h2>
            </div>
        </div>
    </nui-dropzone>

    <!-- Empty state: always-visible centered prompt. NOT wrapped in
         nui-dropzone (which is invisible until drag). The button and
         text are plain HTML the user can see and click immediately. -->
    <section class="projects-empty" hidden>
        <div class="projects-empty-inner">
            <h2>Drop an Arena conversation to begin</h2>
            <p>Or pick a JSON export from your computer.</p>
            <nui-button variant="primary">
                <button type="button" data-action="import-pick">Select File</button>
            </nui-button>
        </div>
    </section>

    <!-- Populated state: a normal list with a top toolbar. -->
    <section class="projects-list">
        <div class="projects-list-toolbar">
            <nui-button variant="outline">
                <button type="button" data-action="import-pick">
                    <nui-icon name="upload"></nui-icon>
                    Import another
                </button>
            </nui-button>
        </div>
        <div class="projects-list-body">
            <nui-list id="project-list"></nui-list>
        </div>
    </section>
</div>

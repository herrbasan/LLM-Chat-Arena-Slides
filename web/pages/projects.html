<div class="page-projects">
    <!-- Empty state: the entire content area is one big dropzone.
         The dropzone is invisible by default; the dashed border on
         the [data-drop] child is the visible drop target. -->
    <section class="projects-empty" hidden>
        <nui-dropzone id="import-dropzone-empty">
            <div data-drop="import" class="dropzone-empty-target">
                <div class="dropzone-empty-content">
                    <h2>Drop an Arena conversation to begin</h2>
                    <p>Or pick a JSON export from your computer.</p>
                    <nui-button variant="primary">
                        <button type="button" data-action="import-pick">Select File</button>
                    </nui-button>
                </div>
            </div>
        </nui-dropzone>
    </section>

    <!-- Populated state: a normal list with a top toolbar. No dropzone
         visible — the user has already imported; if they want to add
         another, they use the "Import another" button. We could add
         a dropzone here too for drag-to-add, but it would be hidden
         until drag anyway. -->
    <section class="projects-list">
        <div class="projects-list-toolbar">
            <nui-button variant="outline">
                <button type="button" data-action="import-pick">
                    <nui-icon name="upload"></nui-icon>
                    Import another
                </button>
            </nui-button>
        </div>
        <div class="projects-list-body">
            <nui-list id="project-list"></nui-list>
        </div>
    </section>
</div>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Slideshow</title>

    <!-- NUI Core -->
    <link rel="stylesheet" href="/nui/css/nui-theme.css">
    <link rel="stylesheet" href="/nui/css/nui-components.css">
    <script type="module" src="/nui/nui.js"></script>

    <!-- App Styles -->
    <link rel="stylesheet" href="/css/slideshow.css">
    
    <!-- Dynamic config generated by backend -->
    <script src="/js/config.js"></script>
    
    <!-- App Logic -->
    <script type="module" src="/js/app.js"></script>
</head>
<body class="nui-theme-dark">
    <!-- DEV ONLY DEBUG ADDON -->
    <script type="module" src="/nui/lib/modules/nui-debug.js"></script>
    <link rel="stylesheet" href="/nui/css/modules/nui-debug.css">

    <nui-app>
        <nui-skip-links></nui-skip-links>
        <nui-app-header hidden>
            <header hidden>
                <div slot="left"><strong>Arena Slideshow</strong></div>
                <div slot="center"></div>
                <div slot="right"></div>
            </header>
        </nui-app-header>

        <!-- Keep sidebar for structural validation, though hidden -->
        <nui-sidebar hidden behavior="primary">
            <nav></nav>
        </nui-sidebar>

        <nui-content>
            <main>
                <!-- Tabs for Navigation -->
                <nui-tabs>
                    <nav aria-label="Main Navigation" style="position: sticky; top: 0; z-index: 100; background: var(--color-base);">
                        <button type="button" aria-selected="true" aria-controls="panel-dashboard" id="tab-dashboard">Dashboard</button>
                        <button type="button" aria-selected="false" aria-controls="panel-edit" id="tab-edit" disabled>Edit</button>
                        <button type="button" aria-selected="false" aria-controls="panel-preview" id="tab-preview" disabled>Preview</button>
                        <button type="button" aria-selected="false" aria-controls="panel-render" id="tab-render" disabled>Render & Play</button>
                    </nav>

                    <div id="panel-dashboard" role="tabpanel" aria-labelledby="tab-dashboard">
                        <nui-page breakout>
                            <div class="dashboard-layout" style="display: grid; gap: var(--nui-space-double); grid-template-columns: 1fr 1fr; margin-top: var(--nui-space-double);">
                                <nui-card>
                                    <h3>Projects</h3>
                                    <div id="projects-list">Loading...</div>
                                </nui-card>
                                <nui-dropzone id="import-dropzone">
                                    <div class="dropzone-content" style="padding: var(--nui-space-triple); text-align: center;">
                                        <p>Drag & Drop Arena JSON Export Here</p>
                                        <p>- or -</p>
                                        <nui-button variant="primary">
                                            <button type="button" id="btn-import-file">Select File</button>
                                        </nui-button>
                                    </div>
                                    <input type="file" id="import-file-input" accept="application/json" hidden>
                                </nui-dropzone>
                            </div>
                        </nui-page>
                    </div>

                    <div id="panel-edit" role="tabpanel" aria-labelledby="tab-edit" hidden>
                        <div class="edit-layout" style="display: grid; gap: var(--nui-space); grid-template-columns: 350px 1fr; padding: var(--nui-space); height: calc(100vh - 50px); box-sizing: border-box;">
                            <!-- Left Column: Steering -->
                            <div class="edit-sidebar" style="display: grid; grid-template-rows: 1fr 1fr; gap: var(--nui-space); height: 100%; overflow: hidden;">
                                <div style="display: flex; flex-direction: column; overflow: hidden;">
                                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--nui-space-half);">
                                        <h3 style="margin: 0;">Conversation</h3>
                                        <div>
                                            <nui-button variant="primary" data-action="generate-slides">
                                                <button type="button">Generate Slides</button>
                                            </nui-button>
                                        </div>
                                    </div>
                                    <div id="conversation-source-list" style="overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: var(--nui-space-half); padding-right: var(--nui-space-half);">
                                        <!-- Dynamically injected messages -->
                                    </div>
                                </div>

                                <div style="display: flex; flex-direction: column; overflow: hidden; border-top: 1px solid var(--border-shade1-4); padding-top: var(--nui-space-half);">
                                    <h3 style="margin: 0 0 var(--nui-space-half) 0;">Slide AI</h3>
                                    <div id="chat-history" style="flex: 1; overflow-y: auto; padding-right: var(--nui-space-half); margin-bottom: var(--nui-space-half);">
                                        <!-- Chat messages -->
                                    </div>
                                    <div style="display: flex; gap: var(--nui-space-half);">
                                        <div style="flex: 1;">
                                            <nui-input>
                                                <input type="text" id="chat-input" placeholder="Ask LLM...">
                                            </nui-input>
                                        </div>
                                        <div>
                                            <nui-button variant="primary" data-action="chat-send">
                                                <button type="button">Send</button>
                                            </nui-button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Right Column: The Deck (now using the rest of the layout) -->
                            <div style="display: flex; flex-direction: column; overflow: hidden; height: 100%;">
                                <div class="edit-deck" id="slide-deck-list" style="flex: 1; display: flex; flex-direction: column; gap: var(--nui-space); overflow-y: auto; padding-right: var(--nui-space); padding-bottom: var(--nui-space-double);">
                                    <!-- Slide cards injected here -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="panel-preview" role="tabpanel" aria-labelledby="tab-preview" hidden>
                        <nui-page>
                            <div id="preview-container" style="margin-top: var(--nui-space-double); display: grid; gap: var(--nui-space-double); grid-template-columns: 350px 1fr;">
                                <div class="preview-sidebar" style="display: flex; flex-direction: column; gap: var(--nui-space);">
                                    <nui-card>
                                        <h3>Voice Mapping</h3>
                                        <div id="voice-mapping-ui">
                                            <!-- Dynamically injected -->
                                        </div>
                                    </nui-card>
                                </div>
                                <div class="preview-main">
                                    <h2>Preview Mode</h2>
                                    <!-- Player will go here later -->
                                </div>
                            </div>
                        </nui-page>
                    </div>

                    <div id="panel-render" role="tabpanel" aria-labelledby="tab-render" hidden>
                        <nui-page>
                            <div id="render-container" style="margin-top: var(--nui-space-double);">
                                <h2>Render & Play</h2>
                            </div>
                        </nui-page>
                    </div>
                </nui-tabs>
            </main>
        </nui-content>
    </nui-app>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Slideshow — Playback</title>
<style>
    :root {
        --bg: #0d0d0d;
        --surface: #1a1a1a;
        --text: #e0e0e0;
        --text-dim: #808080;
        --highlight: #f0a040;
        --highlight-glow: rgba(240, 160, 64, 0.3);
        --accent: #5080d0;
        --border: #2a2a2a;
        --radius: 8px;
        --space: 16px;
        --font-mono: 'Consolas', 'Fira Code', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    /* ─── Top Bar ──────────────────────────── */
    #topbar {
        display: flex;
        align-items: center;
        gap: var(--space);
        padding: 8px var(--space);
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }
    #topbar select, #topbar button, #topbar input {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
    }
    #topbar button:hover { background: #2a2a2a; }
    #topbar button:disabled { opacity: 0.4; cursor: default; }
    #topbar .title { font-weight: bold; margin-right: auto; }
    #slide-counter { color: var(--text-dim); font-size: 12px; min-width: 80px; text-align: right; }

    /* ─── Slide Area ───────────────────────── */
    #slide-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px;
        position: relative;
        overflow-y: auto;
    }
    #slide-content {
        max-width: 900px;
        width: 100%;
    }
    .slide-type-tag {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--text-dim);
        margin-bottom: 8px;
    }
    .slide-speaker {
        font-size: 14px;
        font-weight: bold;
        color: var(--accent);
        margin-bottom: 4px;
    }
    .slide-title-text {
        font-size: 36px;
        font-weight: bold;
        margin-bottom: 8px;
        line-height: 1.2;
    }
    .slide-subtitle {
        font-size: 18px;
        color: var(--text-dim);
        margin-bottom: 24px;
    }
    /* ─── Word Highlighting ────────────────── */
    #words-container {
        font-size: 22px;
        line-height: 1.7;
        word-spacing: 0.15em;
    }
    #words-container .word {
        display: inline;
        transition: color 0.15s, text-shadow 0.15s;
        padding: 1px 2px;
        border-radius: 3px;
    }
    #words-container .word.active {
        color: var(--highlight);
        text-shadow: 0 0 12px var(--highlight-glow);
        background: rgba(240, 160, 64, 0.1);
    }
    #words-container .word.past {
        color: var(--text-dim);
    }
    #words-container .word.future {
        color: var(--text);
    }

    /* ─── Progress Bar ─────────────────────── */
    #progress-bar {
        width: 100%;
        height: 3px;
        background: var(--border);
        flex-shrink: 0;
        cursor: pointer;
        position: relative;
    }
    #progress-fill {
        height: 100%;
        background: var(--highlight);
        transition: width 0.1s linear;
        width: 0%;
    }

    /* ─── Bottom Controls ──────────────────── */
    #controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space);
        padding: 12px var(--space);
        background: var(--surface);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
    }
    #controls button {
        background: none;
        border: 1px solid var(--border);
        color: var(--text);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    #controls button:hover { background: #2a2a2a; }
    #controls button:disabled { opacity: 0.3; cursor: default; }
    #controls button.play-btn { width: 52px; height: 52px; font-size: 22px; }
    #time-display { color: var(--text-dim); font-size: 12px; font-family: var(--font-mono); min-width: 90px; text-align: center; }

    /* ─── No Data State ────────────────────── */
    #no-data {
        text-align: center;
        color: var(--text-dim);
    }
    #no-data h2 { margin-bottom: var(--space); }
    #no-data code {
        background: var(--surface);
        padding: 4px 8px;
        border-radius: 4px;
        font-family: var(--font-mono);
    }

    /* ─── File Loader ──────────────────────── */
    #file-loader {
        display: flex;
        gap: 8px;
        align-items: center;
    }
    #file-loader input[type="file"] { display: none; }
</style>
</head>
<body>

<div id="topbar">
    <span class="title" id="deck-title">Arena Slideshow</span>
    <div id="file-loader">
        <button id="btn-load-file" title="Load slide deck JSON">📂 Load</button>
        <input type="file" id="file-input" accept=".json">
    </div>
    <select id="deck-select" style="display:none;">
        <option value="">— Select Deck —</option>
    </select>
    <span id="slide-counter">—/—</span>
</div>

<div id="slide-area">
    <div id="slide-content">
        <div id="no-data">
            <h2>No Slide Deck Loaded</h2>
            <p>Click <strong>📂 Load</strong> to select a <code>slide_deck_aligned.json</code> file,</p>
            <p>or pass <code>?deck=path</code> in the URL.</p>
        </div>
    </div>
</div>

<div id="progress-bar">
    <div id="progress-fill"></div>
</div>

<div id="controls">
    <button id="btn-generate" title="Generate Slides from Source" style="display:none; width:auto; border-radius:6px; padding:0 16px; font-size:13px;">⚡ Generate Slides</button>
    <button id="btn-render" title="Render TTS Audio" style="display:none; width:auto; border-radius:6px; padding:0 16px; font-size:13px;">🎙 Render</button>
    <button id="btn-prev" title="Previous Slide">⏮</button>
    <button id="btn-play" class="play-btn" title="Play/Pause">▶</button>
    <button id="btn-next" title="Next Slide">⏭</button>
    <span id="time-display">00:00 / 00:00</span>
    <button id="btn-speed" title="Playback Speed">1×</button>
</div>

<script>
// ─── Playback Engine ──────────────────────────────────────────

const $ = (sel) => document.querySelector(sel);
const audio = new Audio();
let deck = null;
let arenaSource = null;  // Raw Arena JSON for generation
let currentSlideIdx = 0;
let isPlaying = false;
let playbackSpeed = 1.0;
let rafId = null;

// ─── Load Data (deck or source) ──────────────────────────────

async function loadData(url) {
    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (data.messages && Array.isArray(data.messages)) {
            // Arena export — store source for generation
            arenaSource = data;
            deck = null;
            console.log(`[Playback] Loaded source: "${data.topic}", ${data.messages.length} messages`);
            $('#deck-title').textContent = (data.topic || 'Untitled') + ' (source)';
            showSourceMode();
        } else if (data.slides && Array.isArray(data.slides)) {
            // Slide deck — play directly
            deck = data;
            arenaSource = null;
            console.log(`[Playback] Loaded deck: ${data.source?.topic || 'Unknown'}, ${data.slides.length} slides`);
            $('#deck-title').textContent = data.source?.topic || 'Arena Slideshow';
            showPlayMode();
            currentSlideIdx = 0;
            loadSlide(0);
        } else {
            throw new Error('Unknown format: need Arena export (.messages) or slide deck (.slides)');
        }
    } catch (err) {
        console.error('[Playback] Failed to load:', err);
        $('#no-data').innerHTML = `<h2>Error</h2><p>${err.message}</p>`;
    }
}

function showSourceMode() {
    $('#no-data').innerHTML = `
        <h2>${escHtml(arenaSource?.topic || 'Untitled')}</h2>
        <p>${arenaSource?.messages?.length || 0} messages ready</p>
        <p style="margin-top:16px;">Click <strong>⚡ Generate Slides</strong> to create the slide deck.</p>
    `;
    $('#btn-generate').style.display = '';
    $('#btn-play').disabled = true;
    $('#btn-prev').disabled = true;
    $('#btn-next').disabled = true;
    $('#slide-counter').textContent = '—';
    $('#progress-fill').style.width = '0%';
}

function showPlayMode() {
    const noData = $('#no-data');
    if (noData) noData.style.display = 'none';
    $('#btn-generate').style.display = 'none';
    // Show Render button if deck has slides without audio
    const hasAudio = deck?.slides?.some(s => s.tts && s.tts.audioPath);
    $('#btn-render').style.display = hasAudio ? 'none' : '';
    $('#btn-play').disabled = false;
    updateButtonStates();
}

// ─── Generate Slides ─────────────────────────────────────────

async function generateSlides() {
    if (!arenaSource) return;

    const btn = $('#btn-generate');
    btn.textContent = '⏳ Generating...';
    btn.disabled = true;

    try {
        const res = await fetch('/api/generate-deck', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(arenaSource)
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${res.status}`);
        }
        deck = await res.json();
        console.log(`[Playback] Generated deck: ${deck.slides.length} slides`);
        $('#deck-title').textContent = deck.source?.topic || 'Arena Slideshow';
        showPlayMode();
        currentSlideIdx = 0;
        loadSlide(0);
    } catch (err) {
        console.error('[Playback] Generation failed:', err);
        btn.textContent = '⚡ Generate Slides';
        btn.disabled = false;
        alert('Generation failed: ' + err.message);
    }
}

// ─── Render TTS Audio ────────────────────────────────────────

async function renderSlides() {
    if (!deck) return;

    const btn = $('#btn-render');
    btn.textContent = '⏳ Rendering...';
    btn.disabled = true;

    try {
        const res = await fetch('/api/render-deck', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(deck)
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${res.status}`);
        }
        deck = await res.json();
        const withAudio = deck.slides.filter(s => s.tts && !s.tts.error).length;
        console.log(`[Playback] Rendered: ${withAudio}/${deck.slides.length} slides with audio`);
        showPlayMode();
        loadSlide(currentSlideIdx);
    } catch (err) {
        console.error('[Playback] Render failed:', err);
        btn.textContent = '🎙 Render';
        btn.disabled = false;
        alert('Render failed: ' + err.message);
    }
}

// ─── Slide Rendering ──────────────────────────────────────────

function loadSlide(idx) {
    if (!deck || idx < 0 || idx >= deck.slides.length) return;

    currentSlideIdx = idx;
    const slide = deck.slides[idx];
    const container = $('#slide-content');

    let html = '';

    // Type tag
    html += `<div class="slide-type-tag">${slide.type}${slide.chunkIdx !== undefined ? ` (part ${slide.chunkIdx + 1})` : ''}</div>`;

    // Speaker
    html += `<div class="slide-speaker">${slide.label || slide.speaker || 'Unknown'}</div>`;

    // Title/subtitle for title slides
    if (slide.type === 'title') {
        html += `<div class="slide-title-text">${escHtml(slide.text)}</div>`;
        if (slide.subtitle) {
            html += `<div class="slide-subtitle">${escHtml(slide.subtitle)}</div>`;
        }
        // For title slides, show narration as subtitle text
        if (slide.narration) {
            html += `<div id="words-container">${buildWordSpans(slide.narration, slide.tts?.words)}</div>`;
        }
    } else if (slide.type === 'end') {
        html += `<div class="slide-title-text">${escHtml(slide.text)}</div>`;
        if (slide.subtitle) {
            html += `<div class="slide-subtitle">${escHtml(slide.subtitle)}</div>`;
        }
        if (slide.narration) {
            html += `<div id="words-container">${buildWordSpans(slide.narration, slide.tts?.words)}</div>`;
        }
    } else {
        // Conversation and narration slides — show text with word spans
        html += `<div id="words-container">${buildWordSpans(slide.text, slide.tts?.words)}</div>`;
    }

    container.innerHTML = html;

    // Load audio
    const tts = slide.tts;
    if (tts && !tts.error && tts.audioPath) {
        // Convert absolute path to server-relative URL
        // Paths look like: D:\Work\_GIT\...\pipeline\output\full\audio\slide_000.mp3
        // We need: /pipeline/output/full/audio/slide_000.mp3
        let audioUrl = tts.audioPath.replace(/\\/g, '/');
        const pipelineIdx = audioUrl.indexOf('/pipeline/');
        if (pipelineIdx !== -1) {
            audioUrl = audioUrl.substring(pipelineIdx);
        } else if (!audioUrl.startsWith('/')) {
            audioUrl = '/' + audioUrl;
        }
        audio.src = audioUrl;
        audio.playbackRate = playbackSpeed;
        console.log(`[Playback] Slide ${idx}: audio=${audioUrl}, words=${tts.words?.length || 0}`);
    } else {
        audio.src = '';
        console.log(`[Playback] Slide ${idx}: no audio`);
    }

    updateSlideCounter();
    updateButtonStates();
    updateProgress(0);
    updateTimeDisplay(0, tts?.durationMs || 0);

    // Auto-play if we were playing
    if (isPlaying && audio.src) {
        audio.play().catch(e => console.warn('Auto-play failed:', e));
    }
}

function buildWordSpans(text, words) {
    if (!text) return '';
    const textWords = text.split(/\s+/).filter(w => w.length > 0);
    return textWords.map((w, i) => {
        const timing = words && words[i];
        const dataAttrs = timing
            ? ` data-start="${timing.startMs}" data-end="${timing.endMs}"`
            : '';
        return `<span class="word future"${dataAttrs}>${escHtml(w)}</span> `;
    }).join('');
}

function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Word Highlighting ────────────────────────────────────────

function updateWordHighlight(currentTimeMs) {
    const words = document.querySelectorAll('#words-container .word');
    if (words.length === 0) return;

    words.forEach((el, i) => {
        const startMs = parseFloat(el.dataset.start);
        const endMs = parseFloat(el.dataset.end);

        if (isNaN(startMs) || isNaN(endMs)) {
            // No timing data — don't highlight
            el.className = 'word future';
            return;
        }

        if (currentTimeMs >= startMs && currentTimeMs < endMs) {
            el.className = 'word active';
        } else if (currentTimeMs >= endMs) {
            el.className = 'word past';
        } else {
            el.className = 'word future';
        }
    });
}

function updateProgress(currentTimeMs) {
    const tts = deck?.slides[currentSlideIdx]?.tts;
    const durationMs = tts?.durationMs || 0;
    const pct = durationMs > 0 ? (currentTimeMs / durationMs) * 100 : 0;
    $('#progress-fill').style.width = Math.min(pct, 100) + '%';
}

function updateTimeDisplay(currentMs, durationMs) {
    const fmt = (ms) => {
        const s = Math.floor(ms / 1000);
        const m = Math.floor(s / 60);
        return `${String(m).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
    };
    $('#time-display').textContent = `${fmt(currentMs)} / ${fmt(durationMs)}`;
}

// ─── Animation Loop ───────────────────────────────────────────

function animationLoop() {
    if (!audio.src || audio.paused) {
        rafId = null;
        return;
    }

    const currentTimeMs = audio.currentTime * 1000;
    const tts = deck?.slides[currentSlideIdx]?.tts;
    const durationMs = tts?.durationMs || (audio.duration * 1000) || 0;

    updateWordHighlight(currentTimeMs);
    updateProgress(currentTimeMs);
    updateTimeDisplay(currentTimeMs, durationMs);

    rafId = requestAnimationFrame(animationLoop);
}

function startAnimationLoop() {
    if (!rafId) {
        rafId = requestAnimationFrame(animationLoop);
    }
}

function stopAnimationLoop() {
    if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = null;
    }
}

// ─── Audio Events ─────────────────────────────────────────────

audio.addEventListener('play', () => {
    isPlaying = true;
    $('#btn-play').textContent = '⏸';
    startAnimationLoop();
});

audio.addEventListener('pause', () => {
    isPlaying = false;
    $('#btn-play').textContent = '▶';
    stopAnimationLoop();
});

audio.addEventListener('ended', () => {
    isPlaying = false;
    $('#btn-play').textContent = '▶';
    stopAnimationLoop();
    // Auto-advance to next slide
    if (currentSlideIdx < (deck?.slides?.length || 1) - 1) {
        setTimeout(() => nextSlide(), 500);
    }
});

audio.addEventListener('error', (e) => {
    console.error('[Playback] Audio error:', e);
    isPlaying = false;
    $('#btn-play').textContent = '▶';
    stopAnimationLoop();
});

// ─── Controls ─────────────────────────────────────────────────

function togglePlay() {
    if (!audio.src) return; // No audio — nothing to play

    if (audio.paused) {
        audio.play().catch(e => console.warn('Play failed:', e));
    } else {
        audio.pause();
    }
}

function prevSlide() {
    if (currentSlideIdx > 0) {
        audio.pause();
        stopAnimationLoop();
        loadSlide(currentSlideIdx - 1);
        if (isPlaying && audio.src) {
            setTimeout(() => audio.play().catch(e => {}), 100);
        }
    }
}

function nextSlide() {
    if (deck && currentSlideIdx < deck.slides.length - 1) {
        audio.pause();
        stopAnimationLoop();
        loadSlide(currentSlideIdx + 1);
        if (isPlaying && audio.src) {
            setTimeout(() => audio.play().catch(e => {}), 100);
        }
    }
}

function cycleSpeed() {
    const speeds = [0.5, 0.75, 1.0, 1.25, 1.5, 2.0];
    const current = speeds.indexOf(playbackSpeed);
    playbackSpeed = speeds[(current + 1) % speeds.length];
    audio.playbackRate = playbackSpeed;
    $('#btn-speed').textContent = playbackSpeed + '×';
}

function updateButtonStates() {
    $('#btn-prev').disabled = currentSlideIdx === 0;
    $('#btn-next').disabled = !deck || currentSlideIdx >= deck.slides.length - 1;
    // Disable play when there's no audio for the current slide
    const tts = deck?.slides?.[currentSlideIdx]?.tts;
    $('#btn-play').disabled = !tts || !tts.audioPath;
}

function updateSlideCounter() {
    $('#slide-counter').textContent = deck
        ? `${currentSlideIdx + 1}/${deck.slides.length}`
        : '—/—';
}

// Progress bar click to seek
$('#progress-bar').addEventListener('click', (e) => {
    if (!audio.src) return;
    const rect = $('#progress-bar').getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    const tts = deck?.slides[currentSlideIdx]?.tts;
    const durationMs = tts?.durationMs || (audio.duration * 1000) || 0;
    audio.currentTime = (pct * durationMs) / 1000;
});

// ─── Event Wiring ─────────────────────────────────────────────

$('#btn-play').addEventListener('click', togglePlay);
$('#btn-prev').addEventListener('click', prevSlide);
$('#btn-next').addEventListener('click', nextSlide);
$('#btn-speed').addEventListener('click', cycleSpeed);
$('#btn-generate').addEventListener('click', generateSlides);
$('#btn-render').addEventListener('click', renderSlides);
$('#btn-load-file').addEventListener('click', () => $('#file-input').click());
$('#file-input').addEventListener('change', (e) => {
    if (e.target.files[0]) {
        const url = URL.createObjectURL(e.target.files[0]);
        loadData(url);
    }
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    switch (e.key) {
        case ' ': e.preventDefault(); togglePlay(); break;
        case 'ArrowLeft': prevSlide(); break;
        case 'ArrowRight': nextSlide(); break;
        case 'ArrowUp': cycleSpeed(); break;
    }
});

// ─── Init ─────────────────────────────────────────────────────

// Check for ?deck= or ?source= URL parameter
const params = new URLSearchParams(window.location.search);
const deckParam = params.get('deck');
const sourceParam = params.get('source');
if (deckParam) {
    loadData(deckParam);
} else if (sourceParam) {
    loadData(sourceParam);
}

// Expose for debugging
window.deck = () => deck;
window.goto = (idx) => { audio.pause(); stopAnimationLoop(); loadSlide(idx); };
</script>
</body>
</html>
